<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ringvoo - 100% EXACT Original Dialer + Scroll Incoming</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ── EXACT ORIGINAL STYLES FROM paste.txt ── */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:'DM Sans',sans-serif;background:#f9fafb;color:#111827;overflow-x:hidden}

    :root{
      --bg:#f9fafb;--bg2:#ffffff;--bg3:#f3f4f6;--text:#111827;--text2:#4b5563;--text3:#9ca3af;--text4:#d1d5db;
      --border:#e5e7eb;--border2:#d1d5db;--green:#00e5a0;--green2:#00b87f;
    }
    [data-theme="dark"]{
      --bg:#0a0e1a;--bg2:#0d1220;--bg3:rgba(255,255,255,0.03);--text:#ffffff;--text2:rgba(255,255,255,0.72);
      --text3:rgba(255,255,255,0.5);--text4:rgba(255,255,255,0.26);--border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);
    }

    @keyframes pulse2{0%,100%{opacity:1}50%{opacity:.5}}
    @keyframes rippleOut{0%{transform:scale(.8);opacity:.7}100%{transform:scale(1.8);opacity:0}}
    @keyframes incomingSlide{from{right:-350px;opacity:0}to{right:24px;opacity:1}}

    /* ── SECTIONS ── */
    .hero{min-height:100vh;padding:140px 24px;display:flex;align-items:center;justify-content:center;text-align:center;background:linear-gradient(135deg,var(--bg) 0%,var(--bg2) 100%)}
    .trigger-zone{min-height:120vh;padding:100px 24px;background:var(--bg3);position:relative}
    [data-theme="dark"] .trigger-zone{background:#0f1623}

    /* ── EXACT ORIGINAL DIALER ── */
    .dialer-wrap{position:fixed;right:40px;top:50%;transform:translateY(-50%);width:380px;z-index:100}
    .dialer-glow{position:absolute;inset:-6px;background:linear-gradient(to bottom,rgba(0,229,160,.18),rgba(0,229,160,.04),transparent);border-radius:28px;filter:blur(20px);opacity:0;transition:opacity .4s}
    .dialer.live .dialer-glow{opacity:1}

    .dialer-card{
      position:relative;background:#ffffff;border:1px solid rgba(229,231,235,.85);border-radius:24px;box-shadow:0 18px 40px rgba(15,23,42,.25),0 8px 20px rgba(15,23,42,.22);overflow:hidden;transition:all .3s;width:380px;height:680px;
    }
    [data-theme="dark"] .dialer-card{background:#0f1623;border-color:rgba(255,255,255,.08);box-shadow:0 25px 50px rgba(0,0,0,.5)}

    /* ── EXACT ORIGINAL TOPBAR ── */
    .d-topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 10px}
    .d-go-online-btn{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;padding:6px 14px;border-radius:999px;border:1px solid;background:var(--bg2);border-color:var(--border2);color:var(--text3);cursor:pointer;transition:all .25s}
    [data-theme="dark"] .d-go-online-btn{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1);color:rgba(255,255,255,.6)}
    .d-go-online-btn.online{background:#00e5a0;border-color:#00e5a0;color:#0a0e1a}
    .d-status-dot{width:8px;height:8px;border-radius:50%;background:var(--border2);transition:all .3s}
    .d-status-dot.online{background:#0a0e1a;animation:pulse2 2s infinite}

    .d-balance-btn{display:flex;align-items:center;gap:6px;background:transparent;border:1px dashed var(--border);border-radius:999px;padding:5px 10px;cursor:pointer;transition:all .2s;opacity:.75}
    [data-theme="dark"] .d-balance-btn{border-color:rgba(255,255,255,.18)}
    .d-balance-btn:hover{border-color:rgba(0,229,160,.35);opacity:1}
    .d-bal-label{font-size:12px;color:var(--text3)}
    .d-bal-val{font-size:12px;font-weight:700;color:#00b87f}
    [data-theme="dark"] .d-bal-val{color:#00e5a0}

    /* ── EXACT ORIGINAL TABS ── */
    .d-tabs-wrap{margin:0 20px 16px;background:var(--bg2);border-radius:12px;padding:4px;display:flex}
    [data-theme="dark"] .d-tabs-wrap{background:rgba(255,255,255,.04)}
    .d-tab{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px;border-radius:8px;font-size:12px;font-weight:600;border:none;cursor:pointer;transition:all .2s;color:var(--text3);background:transparent}
    .d-tab.active{background:#ffffff;color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}
    [data-theme="dark"] .d-tab.active{background:rgba(255,255,255,.1);color:#ffffff}

    /* ── EXACT ORIGINAL NUMBER INPUT ── */
    .d-num-row{margin:0 20px 12px;position:relative}
    .d-num-field-wrap{display:flex;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:12px;transition:border-color .2s}
    [data-theme="dark"] .d-num-field-wrap{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.1)}
    .d-cc-btn{display:flex;align-items:center;gap:6px;padding-right:12px;border-right:1px solid var(--border);flex-shrink:0;background:none;border:none;cursor:pointer}
    [data-theme="dark"] .d-cc-btn{border-right-color:rgba(255,255,255,.1)}
    .d-num-input{flex:1;padding-left:12px;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;min-width:0}
    .d-num-input::placeholder{color:var(--text4)}

    /* ── EXACT ORIGINAL CALLER ID ROW ── */
    .d-caller-row{margin:0 20px 8px;display:flex;align-items:center;gap:12px}
    .d-caller-label{font-size:12px;color:var(--text3);white-space:nowrap}
    .d-caller-sel{display:flex;align-items:center;gap:6px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:4px 10px;cursor:pointer;transition:border-color .2s}
    [data-theme="dark"] .d-caller-sel{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.1)}
    .d-caller-sel:hover{border-color:rgba(0,229,160,.4)}
    .d-caller-sel span{font-size:12px}
    .d-caller-sel .sel-txt{font-size:12px;font-weight:500;color:var(--text2)}
    .d-caller-sel svg{width:12px;height:12px;color:var(--text3)}

    /* ── EXACT ORIGINAL ADD CONTACT ── */
    .d-add-contact{display:flex;justify-content:center;margin-bottom:8px}
    .d-add-contact button{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3);border:1px dashed var(--border);border-radius:100px;padding:6px 16px;background:none;cursor:pointer;transition:all .2s}
    .d-add-contact button:hover{color:#00b87f;border-color:rgba(0,229,160,.4)}
    [data-theme="dark"] .d-add-contact button:hover{color:#00e5a0}

    /* ── EXACT ORIGINAL KEYPAD ── */
    .d-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px 0;padding:4px 24px 20px}
    .d-key{display:flex;flex-direction:column;align-items:center;justify-content:center;width:68px;height:68px;border-radius:50%;margin:0 auto;background:var(--bg2);border:1px solid var(--border);cursor:pointer;user-select:none;transition:all .1s;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    [data-theme="dark"] .d-key{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.05)}
    .d-key:hover{background:var(--bg3);box-shadow:0 2px 8px rgba(0,0,0,.1)}
    .dk-num{font-size:22px;font-weight:600;color:var(--text);line-height:1}
    .dk-sub{font-size:9px;font-weight:500;letter-spacing:.18em;color:var(--text3);margin-top:2px;text-transform:uppercase}

    /* ── EXACT ORIGINAL CALL ROW (HIDDEN IN LIVE MODE) ── */
    .d-call-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 24px 24px}
    .d-side-btn{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;background:var(--bg2);border:1px solid var(--border);cursor:pointer;transition:all .2s;color:var(--text3)}
    [data-theme="dark"] .d-side-btn{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.05)}
    .d-big-call-btn{width:76px;height:76px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:none;cursor:pointer;transition:all .25s;background:#d1d5db;font-size:11px;font-weight:600;color:var(--text3)}
    [data-theme="dark"] .d-big-call-btn{background:rgba(255,255,255,.1);color:rgba(255,255,255,.7)}
    .d-big-call-btn.ready{background:#00e5a0;box-shadow:0 10px 26px rgba(0,229,160,.42);color:#0a0e1a}
    .d-big-call-btn.ready:hover{background:#00ffb0;transform:scale(1.05)}

    /* ── EXACT ORIGINAL RATE HINT ── */
    .d-rate-hint{padding-bottom:16px;text-align:center;font-size:11px;color:var(--text3)}
    .d-rate-hint span{color:#00b87f;font-weight:600}
    [data-theme="dark"] .d-rate-hint span{color:#00e5a0}

    /* ── NORMAL VS LIVE STATES ── */
    .d-normal{display:block}
    .dialer.live .d-normal{display:none}

    /* ── EXACT ORIGINAL LIVE CALL OVERLAY ── */
    .call-overlay{position:absolute;inset:0;background:#ffffff;border-radius:24px;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:20;padding:32px 24px}
    [data-theme="dark"] .call-overlay{background:#0f1623}
    .call-overlay.show{display:flex}

    .rpl-wrap{position:relative;width:72px;height:72px;margin-bottom:20px}
    .rpl{position:absolute;border-radius:50%;border:2px solid #00e5a0;opacity:0;animation:rippleOut 2.4s ease-out infinite}
    .rpl:nth-child(1){inset:0;animation-delay:0s}
    .rpl:nth-child(2){inset:-14px;animation-delay:.6s}
    .rpl:nth-child(3){inset:-28px;animation-delay:1.2s}
    .rpl-c{position:absolute;inset:0;border-radius:50%;background:rgba(0,229,160,.1);border:1.5px solid rgba(0,229,160,.25);display:grid;place-items:center;color:#00b87f}
    [data-theme="dark"] .rpl-c{color:#00e5a0}
    .rpl-c svg{width:24px;height:24px}

    .ov-num{font-size:18px;font-weight:600;color:var(--text);margin-bottom:4px;letter-spacing:.5px}
    .ov-status{font-size:13px;color:var(--text3);margin-bottom:4px}
    .ov-status[data-state="live"]::after{content:' • Live'}
    .ov-timer{font-size:28px;font-weight:700;color:#00b87f;letter-spacing:3px;margin-bottom:28px;min-height:38px;font-variant-numeric:tabular-nums}
    [data-theme="dark"] .ov-timer{color:#00e5a0}

    .ov-ctrls{display:flex;align-items:center;gap:12px}
    .ov-ctrl{width:44px;height:44px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg2);color:var(--text3);display:grid;place-items:center;cursor:pointer;transition:all .2s}
    .ov-ctrl:hover{border-color:var(--border2);color:var(--text2)}
    .ov-end{width:52px;height:52px;border-radius:50%;border:none;background:#ef4444;color:#fff;display:grid;place-items:center;cursor:pointer;transition:all .2s;box-shadow:0 4px 14px rgba(239,68,68,.35)}
    .ov-end:hover{background:#dc2626;transform:scale(1.06)}

    /* ── EXACT ORIGINAL INCOMING CALL ── */
    .in-popup{position:fixed;top:76px;right:-350px;width:280px;background:#ffffff;border:1.5px solid rgba(0,229,160,.3);border-radius:16px;padding:20px;z-index:999;box-shadow:0 6px 24px rgba(0,229,160,.15),0 10px 30px rgba(0,0,0,.12);transition:all .45s cubic-bezier(.34,1.56,.64,1)}
    [data-theme="dark"] .in-popup{background:#1a2535}
    .in-popup.show{right:24px;animation:incomingSlide .5s ease-out}

    .in-tag{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:#00b87f;display:flex;align-items:center;gap:5px;margin-bottom:8px}
    [data-theme="dark"] .in-tag{color:#00e5a0}
    .in-dot{width:6px;height:6px;border-radius:50%;background:#00e5a0;animation:pulse2 2s infinite}
    .in-num{font-size:16px;font-weight:600;color:var(--text);margin-bottom:2px}
    .in-sub{font-size:12px;color:var(--text3);margin-bottom:14px}
    .in-btns{display:flex;gap:8px}
    .btn-acc{flex:1;padding:9px;border-radius:8px;border:none;background:#00e5a0;color:#0a0e1a;font-weight:600;font-size:13px;cursor:pointer;transition:all .2s}
    .btn-acc:hover{background:#00c48a}
    .btn-dec{flex:1;padding:9px;border-radius:8px;border:1.5px solid #fecdd3;background:#fff1f2;color:#dc2626;font-weight:600;font-size:13px;cursor:pointer;transition:all .2s}
    [data-theme="dark"] .btn-dec{background:rgba(220,38,38,.08);border-color:rgba(220,38,38,.2);color:#f87171}
    .btn-dec:hover{background:#fecdd3}

    /* ── TRIGGER ── */
    .scroll-trigger{position:relative;height:4px;background:linear-gradient(90deg,#00e5a0,#00ffb0);margin:120px auto;width:100px;border-radius:2px}
    .trigger-text{text-align:center;font-size:14px;color:var(--text2);margin-top:12px;font-weight:500}

    /* ── THEME ── */
    .theme-toggle{position:fixed;top:24px;right:24px;z-index:300;width:44px;height:44px;border-radius:12px;background:var(--bg2);border:1px solid var(--border);cursor:pointer;display:grid;place-items:center;color:var(--text3);transition:all .2s}
  </style>
</head>
<body>
  <!-- HERO -->
  <section class="hero">
    <div>
      <h1 style="font-size:52px;font-weight:800;line-height:1.1;margin-bottom:24px;color:var(--text)">Scroll for incoming call</h1>
      <p style="font-size:20px;color:var(--text2);max-width:500px;margin:0 auto">100% EXACT original dialer design</p>
    </div>
  </section>

  <!-- TRIGGER ZONE -->
  <section class="trigger-zone">
    <div style="max-width:800px;margin:0 auto;text-align:center;padding:80px 24px">
      <div class="scroll-trigger" id="scrollTrigger"></div>
      <div class="trigger-text">📱 Scroll → Incoming → Accept → Live Call</div>
    </div>
  </section>

  <!-- ═══ 100% EXACT ORIGINAL DIALER FROM paste.txt ═══ -->
  <div class="dialer-wrap" id="dialerWrap">
    <div class="dialer-glow"></div>
    <div class="dialer-card">

      <!-- ═══ EXACT ORIGINAL LIVE CALL OVERLAY ═══ -->
      <div class="call-overlay" id="callOverlay">
        <div class="rpl-wrap">
          <div class="rpl"></div>
          <div class="rpl"></div>
          <div class="rpl"></div>
          <div class="rpl-c">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
          </div>
        </div>
        <div class="ov-num" id="ovNum">+44 20 7946 1234</div>
        <div class="ov-status" id="ovStatus" data-state="live">Live</div>
        <div class="ov-timer" id="ovTimer">00:00</div>
        <div class="ov-ctrls">
          <button class="ov-ctrl" id="ovMuteBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 5a3 3 0 0 1 6 0v6a3 3 0 0 1-6 0Z"/><path d="M5 10a7 7 0 0 0 14 0"/><path d="M8 21h8"/>
            </svg>
          </button>
          <button class="ov-end" onclick="hangup()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3"/>
            </svg>
          </button>
          <button class="ov-ctrl" id="ovPadBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- ═══ EXACT ORIGINAL NORMAL DIALER ═══ -->
      <div class="d-normal">
        <div class="d-topbar">
          <button class="d-go-online-btn online">
            <span class="d-status-dot online"></span>
            <span>Online</span>
          </button>
          <button class="d-balance-btn">
            <span class="d-bal-label">Balance</span>
            <span class="d-bal-val">$4.20</span>
          </button>
        </div>

        <div class="d-tabs-wrap">
          <button class="d-tab active">
            <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3"/>
            </svg>
            <span>Dial</span>
          </button>
          <button class="d-tab">
            <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36"/>
            </svg>
            <span>Recent</span>
          </button>
        </div>

        <div class="d-num-row">
          <div class="d-num-field-wrap">
            <button class="d-cc-btn">
              <span class="flag">🇺🇸</span>
              <span class="code">+1</span>
              <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="6 9 12 15 18 9"/>
              </svg>
            </button>
            <input class="d-num-input" id="numInput" placeholder="Enter number">
          </div>
        </div>

        <!-- ═══ EXACT ORIGINAL CALLER ID ROW ═══ -->
        <div class="d-caller-row">
          <span class="d-caller-label">Caller ID</span>
          <button class="d-caller-sel">
            <span class="sel-txt">+1 415 555 0139</span>
            <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </button>
        </div>

        <!-- ═══ EXACT ORIGINAL ADD CONTACT ═══ -->
        <div class="d-add-contact">
          <button>
            <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 5v14"/><path d="M5 12h14"/>
            </svg>
            Add to contacts
          </button>
        </div>

        <div class="d-keypad">
          <div class="d-key"><span class="dk-num">1</span></div>
          <div class="d-key"><span class="dk-num">2</span><span class="dk-sub">ABC</span></div>
          <div class="d-key"><span class="dk-num">3</span><span class="dk-sub">DEF</span></div>
          <div class="d-key"><span class="dk-num">4</span><span class="dk-sub">GHI</span></div>
          <div class="d-key"><span class="dk-num">5</span><span class="dk-sub">JKL</span></div>
          <div class="d-key"><span class="dk-num">6</span><span class="dk-sub">MNO</span></div>
          <div class="d-key"><span class="dk-num">7</span><span class="dk-sub">PQRS</span></div>
          <div class="d-key"><span class="dk-num">8</span><span class="dk-sub">TUV</span></div>
          <div class="d-key"><span class="dk-num">9</span><span class="dk-sub">WXYZ</span></div>
          <div class="d-key"><span class="dk-num">*</span></div>
          <div class="d-key"><span class="dk-num">0</span><span class="dk-sub">+</span></div>
          <div class="d-key"><span class="dk-num">#</span></div>
        </div>

        <!-- ═══ EXACT ORIGINAL CALL ROW ═══ -->
        <div class="d-call-row">
          <button class="d-side-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 7h5l4 5-4 5H3z"/><path d="M13 7h8"/><path d="M13 17h8"/>
            </svg>
          </button>
          <button class="d-big-call-btn ready">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3"/>
            </svg>
            <span>Call</span>
          </button>
          <button class="d-side-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 5v14l12-7z"/>
            </svg>
          </button>
        </div>

        <!-- ═══ EXACT ORIGINAL RATE HINT ═══ -->
        <div class="d-rate-hint">
          Estimated rate to <span>United States</span>: from <span>$0.02/min</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ EXACT ORIGINAL INCOMING CALL ═══ -->
  <div class="in-popup" id="incomingPopup">
    <div class="in-tag">
      <span class="in-dot"></span>
      Incoming call
    </div>
    <div class="in-num" id="incomingNum">+44 20 7946 1234</div>
    <div class="in-sub">Tap to accept or decline</div>
    <div class="in-btns">
      <button class="btn-dec" onclick="dismissIncoming()">Decline</button>
      <button class="btn-acc" onclick="acceptIncoming()">Accept</button>
    </div>
  </div>

  <!-- THEME TOGGLE -->
  <button class="theme-toggle" onclick="toggleTheme()">
    <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:block">
      <circle cx="12" cy="12" r="5"/>
    </svg>
    <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
      <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
    </svg>
  </button>

  <script>
    const trigger = document.getElementById('scrollTrigger');
    const incoming = document.getElementById('incomingPopup');
    const dialerWrap = document.getElementById('dialerWrap');
    const callOverlay = document.getElementById('callOverlay');
    let callTimer;
    let seconds = 0;

    // SCROLL → SHOW INCOMING CALL
    window.addEventListener('scroll', () => {
      const rect = trigger.getBoundingClientRect();
      if (rect.top < window.innerHeight * 0.6 && !incoming.classList.contains('show')) {
        incoming.classList.add('show');
      }
    });

    // ACCEPT → LIVE CALL MODE
    function acceptIncoming() {
      const incomingNum = document.getElementById('incomingNum').textContent;
      document.getElementById('ovNum').textContent = incomingNum;
      incoming.classList.remove('show');
      
      dialerWrap.classList.add('live');
      callOverlay.classList.add('show');
      
      seconds = 0;
      updateTimer();
      callTimer = setInterval(() => {
        seconds++;
        updateTimer();
      }, 1000);
    }

    function dismissIncoming() {
      incoming.classList.remove('show');
    }

    function hangup() {
      dialerWrap.classList.remove('live');
      callOverlay.classList.remove('show');
      clearInterval(callTimer);
      document.getElementById('ovTimer').textContent = '00:00';
    }

    function updateTimer() {
      const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
      const secs = (seconds % 60).toString().padStart(2, '0');
      document.getElementById('ovTimer').textContent = `${mins}:${secs}`;
    }

    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', isDark ? 'light' : 'dark');
      document.querySelector('.icon-sun').style.display = isDark ? 'block' : 'none';
      document.querySelector('.icon-moon').style.display = isDark ? 'none' : 'block';
    }
  </script>
</body>
</html>
